    <div class="card presence-card" id="discord-card">
      <div class="discord-avatar-wrap">
        <img class="discord-avatar-img" id="discord-avatar" src="placeholder.html" alt="avatar" />
        <span class="status-dot" id="status-dot"></span>
      </div>
      <div class="presence-info">
        <div class="presence-name-row">
          <span class="presence-name" id="discord-username">loading...</span>
          <span class="presence-handle" id="discord-handle"></span>
          <span class="badge badge-guns" id="guild-badge"></span>
        </div>
        <p class="presence-activity-line" id="activity-line"></p>
        <p class="presence-activity-detail" id="activity-detail"></p>

      <img class="album-art" src="stuff/fakeid.jpg" alt="album art" id="album-art" />
      <div class="track-meta">
        <div class="track-meta-text">
          <p class="track-name" id="track-name">Fake ID</p>

        </div>
      </div>
      <div class="progress-section">

        </div>
        <div class="time-row">
          <span class="time" id="current-time">0:00</span>
          <span class="time" id="duration">0:00</span>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" id="prev-btn" title="Previous"><i class="fa-solid fa-backward-step"></i></button>
        <button class="ctrl-btn play-pause-btn" id="play-btn" title="Play/Pause"><i class="fa-solid fa-play" id="play-icon"></i></button>
        <button class="ctrl-btn" id="next-btn" title="Next"><i class="fa-solid fa-forward-step"></i></button>
      </div>
      <div class="playlist" id="playlist"></div>
    </div>
